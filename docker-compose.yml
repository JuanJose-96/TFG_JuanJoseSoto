services:
  fastfix_db:
    image: postgres:17.6
    container_name: FastFix
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - fastfix_data:/var/lib/postgresql/data
    restart: unless-stopped

  fastfix_pgadmin:
    image: dpage/pgadmin4
    container_name: FastFix_pgAdmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - fastfix_db
    restart: unless-stopped

volumes:
  fastfix_data: