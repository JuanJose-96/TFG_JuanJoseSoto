spring:
  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:${NEON_URL}
    username: ${NEON_USER}
    password: ${NEON_PASSWORD}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: validate
    show-sql: true
cloudinary:
  url: ${CLOUDINARY_URL}